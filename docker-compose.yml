services:
  # Nginx reverse proxy & web server
  nginx:
    image: nginx:alpine
    container_name: laracore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_healthy
    networks:
      - laracore-network
    restart: unless-stopped

  # PHP-FPM applicationac server
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laracore-php
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-laracore}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_FROM_ADDRESS=dev@laracore.test
      - MAIL_FROM_NAME="LaraCore Dev"
      - APP_ENV=local
      - APP_DEBUG=true
      - LARAVEL_SKIP_ENV_FILE=true
    networks:
      - laracore-network
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Node.js for Vite development & hot reload
  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: laracore-node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./src:/var/www/html:delegated
      - /var/www/html/node_modules
    environment:
      - NODE_ENV=development
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=5173
    networks:
      - laracore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/@vite/client"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    container_name: laracore-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_DATABASE:-laracore}
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    networks:
      - laracore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-laracore}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis cache & queue store
  redis:
    image: redis:7-alpine
    container_name: laracore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laracore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Mailpit for email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: laracore-mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true    # ← tambahkan ini
      - MP_UI_ALLOWED_NETWORKS=0.0.0.0/0
    networks:
      - laracore-network
    restart: unless-stopped

# Network for service communication
networks:
  laracore-network:
    driver: bridge

# Named volumes for persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local