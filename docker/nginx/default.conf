upstream php_backend {
    server php:9000;
}

upstream node_backend {
    server node:5173;
}

server {
    listen 80;
    server_name laracore.test;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    #
    # Vite HMR
    #
    location /@vite/client {
        proxy_pass http://node_backend/@vite/client;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /@vite/ {
        proxy_pass http://node_backend/@vite/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /@react-refresh {
        proxy_pass http://node_backend/@react-refresh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /resources/ {
        proxy_pass http://node_backend/resources/;
        proxy_set_header Host $host;
    }

    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri @vite;
        expires 1y;
        access_log off;
    }

    location @vite {
        proxy_pass http://node_backend;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        include fastcgi_params;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_read_timeout 300;
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.php$ {
        deny all;
    }
}